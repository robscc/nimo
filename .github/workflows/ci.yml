name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dev dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          cd backend
          ruff check agentpal/ tests/

      - name: Ruff format check
        run: |
          cd backend
          ruff format --check agentpal/ tests/

      - name: Mypy type check
        run: |
          cd backend
          mypy agentpal/ --ignore-missing-imports
        continue-on-error: true  # 初期不阻塞 CI

  # ── Unit Tests ───────────────────────────────────────────
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/unit/ -v --tb=short \
            --cov=agentpal \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          LLM_API_KEY: test-key

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ── Integration Tests ────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/integration/ -v --tb=short
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          LLM_API_KEY: test-key

  # ── Frontend Build ───────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check & build
        run: |
          cd frontend
          npm run type-check || true
          npm run build
