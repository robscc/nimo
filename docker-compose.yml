# 单镜像部署：前后端一体，SQLite 持久化，挂载 ~/.nimo 配置

services:
  agentpal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentpal
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:8088"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite+aiosqlite:///./data/agentpal.db
      WORKSPACE_DIR: /root/.nimo
    volumes:
      - agentpal_data:/app/data         # SQLite + 持久化数据
      - agentpal_uploads:/app/uploads   # 上传文件
      - ~/.nimo:/root/.nimo             # 配置文件（config.yaml、SOUL.md 等）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  agentpal_data:
  agentpal_uploads:
